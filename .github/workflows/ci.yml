name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y bison flex

      - name: Build
        run: make

      - name: Run tests
        run: tests/run_tests.sh

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: brew install bison flex

      - name: Build
        run: make BISON=$(brew --prefix bison)/bin/bison FLEX=$(brew --prefix flex)/bin/flex

      - name: Run tests
        run: tests/run_tests.sh
